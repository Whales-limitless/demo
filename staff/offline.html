<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PWSTAFF - Offline</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', -apple-system, sans-serif; background: #f3f4f6; color: #1a1a1a; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
  .offline-card { background: #fff; border-radius: 16px; box-shadow: 0 4px 16px rgba(0,0,0,0.08); padding: 40px 32px; text-align: center; max-width: 400px; width: 100%; }
  .offline-icon { width: 64px; height: 64px; margin: 0 auto 16px; color: #C8102E; }
  h1 { font-size: 22px; margin-bottom: 8px; color: #C8102E; }
  p { font-size: 14px; color: #6b7280; line-height: 1.5; margin-bottom: 20px; }
  .btn-retry { display: inline-block; padding: 12px 28px; background: #C8102E; color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; text-decoration: none; }
  .btn-retry:hover { background: #a00d24; }
</style>
</head>
<body>
  <div class="offline-card">
    <svg class="offline-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="1" y1="1" x2="23" y2="23"/>
      <path d="M16.72 11.06A10.94 10.94 0 0119 12.55"/>
      <path d="M5 12.55a10.94 10.94 0 015.17-2.39"/>
      <path d="M10.71 5.05A16 16 0 0122.56 9"/>
      <path d="M1.42 9a15.91 15.91 0 014.7-2.88"/>
      <path d="M8.53 16.11a6 6 0 016.95 0"/>
      <line x1="12" y1="20" x2="12.01" y2="20"/>
    </svg>
    <h1>You're Offline</h1>
    <p>This page isn't available offline yet. Any photos or data you've captured will sync automatically when you're back online.</p>
    <button class="btn-retry" onclick="location.reload()">Try Again</button>
  </div>
</body>
</html>
